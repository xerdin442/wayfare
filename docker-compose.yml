services:
  redis:
    image: redis:latest
    command:
      [
        "redis-server",
        "--requirepass",
        "${ROOT_PASSWORD}",
        "--appendonly",
        "yes",
      ]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - wayfare

  rabbitmq:
    image: rabbitmq:4.2.5-management-alpine
    environment:
      - RABBITMQ_DEFAULT_USER=${ROOT_USERNAME}
      - RABBITMQ_DEFAULT_PASS=${ROOT_PASSWORD}
      - RABBITMQ_MNESIA_BASE=/var/lib/rabbitmq/mnesia
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - wayfare

  mongodb:
    image: mongo:latest
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - wayfare

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      - CLICKHOUSE_DB=wayfare
      - CLICKHOUSE_USER=${ROOT_USERNAME}
      - CLICKHOUSE_PASSWORD=${ROOT_PASSWORD}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    networks:
      - wayfare

  jaeger:
    image: jaegertracing/jaeger:latest
    command: ["--config", "/etc/jaeger/config.yaml"]
    ports:
      - "16686:16686"
    volumes:
      - ./jaeger-config.yaml:/etc/jaeger/config.yaml:ro
    networks:
      - wayfare

  prometheus:
    image: prom/prometheus:latest
    command:
      [
        "--config.file=/etc/prometheus/prometheus.yaml",
        "--storage.tsdb.path=/prometheus",
        "--storage.tsdb.retention.time=30d",
      ]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus_data:/prometheus
    networks:
      - wayfare

  api-gateway:
    build:
      context: .
      dockerfile: docker/api-gateway.Dockerfile
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - mongodb
      - rabbitmq
      - clickhouse
      - trip-service
      - driver-service
      - rider-service
      - payment-service
    expose:
      - "8080"
    networks:
      - wayfare

  trip-service:
    build:
      context: .
      dockerfile: docker/trip-service.Dockerfile
    env_file: .env
    expose:
      - "50051"
      - "2112"
    depends_on:
      - mongodb
      - redis
      - rabbitmq
    networks:
      - wayfare

  driver-service:
    build:
      context: .
      dockerfile: docker/driver-service.Dockerfile
    env_file: .env
    expose:
      - "50051"
      - "2112"
    depends_on:
      - mongodb
      - redis
      - rabbitmq
    networks:
      - wayfare

  rider-service:
    build:
      context: .
      dockerfile: docker/rider-service.Dockerfile
    env_file: .env
    expose:
      - "50051"
      - "2112"
    depends_on:
      - mongodb
    networks:
      - wayfare

  payment-service:
    build:
      context: .
      dockerfile: docker/payment-service.Dockerfile
    env_file: .env
    expose:
      - "50051"
      - "2112"
    depends_on:
      - mongodb
      - redis
      - rabbitmq
    networks:
      - wayfare

volumes:
  redis_data:
  rabbitmq_data:
  mongo_data:
  clickhouse_data:
  clickhouse_logs:
  prometheus_data:

networks:
  wayfare:
    driver: bridge
