syntax = "proto3";

package wayfare;

option go_package = "github.com/xerdin442/wayfare/shared/pkg/rpc";

message Coordinate {
  double latitude  = 1;
  double longitude = 2;
}

message Geometry {
  repeated Coordinate coordinates = 1;
}

message Route {
  double            distance = 1;
  double            duration = 2;
  repeated Geometry geometry = 3;
}

message RideFare {
  string id                  = 1;
  string package_slug        = 2;
  int64  base_price          = 3;
  int64  total_price_in_kobo = 4;
  Route  route               = 5;
}

message Driver {
  string     id              = 1;
  Coordinate location        = 2;
  string     name            = 3;
  string     profile_picture = 4;
  string     car_plate       = 5;
}

message Rider {
  string id              = 1;
  string name            = 2;
  string email           = 3;
  string profile_picture = 4;
}

message Trip {
  string   id            = 1;
  string   user_id       = 2;
  string   driver_id     = 3;
  string   status        = 4;
  RideFare selected_fare = 5;
  Route    route         = 6;
}