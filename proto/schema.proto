syntax = "proto3";

package wayfare;

option go_package = "github.com/xerdin442/wayfare/shared/pkg/pb";

message Coordinate {
  double latitude  = 1;
  double longitude = 2;
  string address   = 3;
}

message Geometry {
  repeated Coordinate coordinates = 1;
}

message Route {
  double            distance = 1;
  double            duration = 2;
  repeated Geometry geometry = 3;
}

message RideFare {
  string id           = 1;
  string package_slug = 2;
  int64  amount       = 3;
  Route  route        = 4;
}

message Driver {
  string id                    = 1;
  string name                  = 2;
  string email                 = 3;
  string phone                 = 4;
  string profile_picture       = 5;
  string car_plate             = 6;
  string car_model             = 7;
  string car_color             = 8;
  string package_slug          = 9;
  double current_rating        = 10;
  int64  total_completed_trips = 11;
  string tier                  = 12;
}

message Rider {
  string id              = 1;
  string name            = 2;
  string email           = 3;
  string phone           = 4;
  string profile_picture = 5;
}

message Trip {
  string   id            = 1;
  string   user_id       = 2;
  string   driver_id     = 3;
  string   status        = 4;
  RideFare selected_fare = 5;
}