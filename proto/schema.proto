syntax = "proto3";

package wayfare;

option go_package = "github.com/xerdin442/wayfare/shared/pkg/pb";

message Coordinate {
  double latitude  = 1;
  double longitude = 2;
}

message Geometry {
  repeated Coordinate coordinates = 1;
}

message Route {
  double            distance = 1;
  double            duration = 2;
  repeated Geometry geometry = 3;
}

message RideFare {
  string id           = 1;
  string package_slug = 2;
  int64  amount       = 3;
  Route  route        = 4;
}

message Driver {
  string id                    = 1;
  string name                  = 2;
  string profile_picture       = 3;
  string car_plate             = 4;
  double current_rating        = 5;
  int64  total_completed_trips = 6;
  string tier                  = 7;
}

message Rider {
  string id              = 1;
  string name            = 2;
  string email           = 3;
  string profile_picture = 4;
}

message Trip {
  string   id            = 1;
  string   user_id       = 2;
  string   driver_id     = 3;
  string   status        = 4;
  RideFare selected_fare = 5;
  Route    route         = 6;
}