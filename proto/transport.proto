syntax = "proto3";

package wayfare;

import "schema.proto";

option go_package = "github.com/xerdin442/wayfare/shared/pkg/pb";

// TripService handles the preview, creation and management of trips
service TripService {
  // PreviewTrip returns the route coordinates and calculated ride fares
  rpc PreviewTrip(PreviewTripRequest) returns (PreviewTripResponse);
  // StartTrip returns the generated trip ID
  rpc StartTrip(StartTripRequest) returns (StartTripResponse);
  // GetTripDetails returns the trip details by ID
  rpc GetTripDetails(TripDetailsRequest) returns (TripDetailsResponse);
  // GetTripHistory returns the trip history for a user
  rpc GetTripHistory(TripHistoryRequest) returns (TripHistoryResponse);
  // GetRegionBounds returns the bounding box for a region
  rpc GetRegionBounds(RegionBoundsRequest) returns (RegionBoundsResponse);
}

// DriverService handles drivers' response to trip requests
service DriverService {
  // GetDriverProfile returns the driver details by ID
  rpc GetDriverProfile(GetProfileRequest) returns (DriverProfileResponse);
  // Login authenticates a driver and returns a JWT token
  rpc Login(LoginRequest) returns (AuthResponse);
  // Signup creates a new driver account
  rpc Signup(SignupDriverRequest) returns (AuthResponse);
}

// RiderService handles rider-related operations
service RiderService {
  // GetRiderProfile returns the rider details by ID
  rpc GetRiderProfile(GetProfileRequest) returns (RiderProfileResponse);
  // Login authenticates a rider and returns a JWT token
  rpc Login(LoginRequest) returns (AuthResponse);
  // Signup creates a new rider account
  rpc Signup(SignupRiderRequest) returns (AuthResponse);
}

// PaymentService handles payments
service PaymentService {
  // InitiateCheckout initiates payment processing and returns checkout URL
  rpc InitiateCheckout(InitiateCheckoutRequest) returns (InitiateCheckoutResponse);
}

message TripDetailsRequest {
  string trip_id = 1;
}

message TripDetailsResponse {
  int64  ride_fare = 1;
  string user_id   = 2;
  string region    = 3;
}

message TripHistoryRequest {
  string user_id = 1;
}

message TripHistoryResponse {
  repeated Trip trips = 1;
}

message RegionBoundsRequest {
  Coordinate pickup = 1;
}

message RegionBoundsResponse {
  string region_id     = 1;
  double min_longitude = 2;
  double min_latitude  = 3;
  double max_longitude = 4;
  double max_latitude  = 5;
  bool   unavailable   = 6;
  string error         = 7;
}

message GetProfileRequest {
  string user_id = 1;
}

message DriverProfileResponse {
  Driver driver = 1;
}

message RiderProfileResponse {
  Rider rider = 1;
}

message LoginRequest {
  string email    = 1;
  string password = 2;
}

message SignupRiderRequest {
  string name          = 1;
  string email         = 2;
  string password      = 3;
  string phone         = 4;
  string profile_image = 5;
}

message SignupDriverRequest {
  string          name                    = 1;
  string          email                   = 2;
  string          password                = 3;
  string          phone                   = 4;
  string          profile_image           = 5;
  repeated string verification_photos     = 6;
  string          car_model               = 7;
  string          car_color               = 8;
  string          car_plate               = 9;
  string          transfer_recipient_code = 10;
}

message AuthResponse {
  string user_id = 1;
}

message PreviewTripRequest {
  string     user_id     = 1;
  string     region_id   = 2;
  Coordinate pickup      = 3;
  Coordinate destination = 4;
}

message PreviewTripResponse {
  repeated RideFare ride_fares = 1;
}

message StartTripRequest {
  string user_id      = 1;
  string ride_fare_id = 2;
}

message StartTripResponse {
  string trip_id = 1;
}

message InitiateCheckoutRequest {
  string txn_type      = 1;
  string trip_id       = 2;
  string user_id       = 3;
  string email         = 4;
  int64  trip_rating   = 5;
  string rider_comment = 6;
  int64  driver_tip    = 7;
}

message InitiateCheckoutResponse {
  string checkout_url = 1;
}
