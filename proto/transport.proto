syntax = "proto3";

package wayfare;

import "schema.proto";

option go_package = "github.com/xerdin442/wayfare/shared/pkg/rpc";

// TripService handles the preview, creation and management of trips
service TripService {
  // PreviewTrip returns the route coordinates and calculated ride fares
  rpc PreviewTrip(PreviewTripRequest) returns (PreviewTripResponse);
  // StartTrip returns the generated trip ID
  rpc StartTrip(StartTripRequest) returns (StartTripResponse);
}

// DriverService handles drivers' response to trip requests
service DriverService {
  // GetDriverByID returns the driver details by ID
  rpc GetDriverByID(GetDriverRequest) returns (GetDriverResponse);
  // Login authenticates a driver and returns a JWT token
  rpc Login(LoginRequest) returns (AuthResponse);
  // Signup creates a new driver account
  rpc Signup(SignupDriverRequest) returns (AuthResponse);
}

// RiderService handles rider-related operations
service RiderService {
  // GetRiderByID returns the rider details by ID
  rpc GetRiderByID(GetRiderRequest) returns (GetRiderResponse);
  // Login authenticates a rider and returns a JWT token
  rpc Login(LoginRequest) returns (AuthResponse);
  // Signup creates a new rider account
  rpc Signup(SignupRiderRequest) returns (AuthResponse);
}

message GetDriverRequest {
  string driver_id = 1;
}

message GetDriverResponse {
  Driver driver = 1;
}

message GetRiderRequest {
  string rider_id = 1;
}

message GetRiderResponse {
  Rider rider = 1;
}

message LoginRequest {
  string email    = 1;
  string password = 2;
}

message SignupRiderRequest {
  string          name            = 1;
  string          email           = 2;
  string          password        = 3;
  optional string profile_picture = 4;
}

message SignupDriverRequest {
  string name            = 1;
  string email           = 2;
  string password        = 3;
  string profile_picture = 4;
  string car_package     = 5;
  string car_plate       = 6;
}

message AuthResponse {
  string user_id = 1;
}

message PreviewTripRequest {
  string     user_id     = 1;
  Coordinate pickup      = 2;
  Coordinate destination = 3;
}

message PreviewTripResponse {
  Route             route      = 1;
  repeated RideFare ride_fares = 2;
}

message StartTripRequest {
  string user_id      = 1;
  string ride_fare_id = 2;
}

message StartTripResponse {
  string trip_id = 1;
}
