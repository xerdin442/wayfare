apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  config.yaml: |
    global:
      scrape_interval: 10s

    scrape_configs:
      - job_name: "api-gateway"
        metrics_path: /api/v1/metrics
        static_configs:
          - targets: [ "api-gateway:8080" ]

      - job_name: "trip-service"
        static_configs:
          - targets: [ "trip-service:2112" ]

      - job_name: "rider-service"
        static_configs:
          - targets: [ "rider-service:2112" ]

      - job_name: "driver-service"
        static_configs:
          - targets: [ "driver-service:2112" ]

      - job_name: "payment-service"
        static_configs:
          - targets: [ "payment-service:2112" ]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: hostpath
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: prometheus
spec:
  serviceName: prometheus
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--config.file=/etc/prometheus/config.yaml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=30d"
          ports:
            - containerPort: 9090
          resources:
            requests:
              memory: "128Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: prometheus-config-volume
              mountPath: /etc/prometheus/config.yaml
              subPath: config.yaml
            - name: prometheus-data
              mountPath: /prometheus
      volumes:
        - name: prometheus-config-volume
          configMap:
            name: prometheus-config
        - name: prometheus-data
          persistentVolumeClaim:
            claimName: prometheus-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  ports:
    - port: 9090
      name: ui
  selector:
    app: prometheus
