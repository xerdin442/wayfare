apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-config
data:
  config.yaml: |
    service:
      extensions: [jaeger_storage, jaeger_query]
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [jaeger_storage_exporter]

    extensions:
      jaeger_storage:
        backends:
          main_storage:
            elasticsearch:
              server_urls: ["http://elasticsearch:9200"]
              auth:
                basic:
                  password: "${ELASTIC_PASSWORD}"
      jaeger_query:
        storage:
          traces: main_storage

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"

    exporters:
      jaeger_storage_exporter:
        trace_storage: main_storage
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      initContainers:
        - name: wait-for-es
          image: busybox
          command:
            [
              "sh",
              "-c",
              "until wget -qO- http://elasticsearch:9200/_cluster/health; do echo waiting for elasticsearch; sleep 5; done",
            ]
      containers:
        - name: jaeger
          image: jaegertracing/jaeger:latest
          args: ["--config", "/etc/jaeger/config.yaml"]
          env:
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ROOT_PASSWORD
          ports:
            - containerPort: 16686
            - containerPort: 4317
            - containerPort: 4318
          volumeMounts:
            - name: jaeger-config-volume
              mountPath: /etc/jaeger/config.yaml
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
      volumes:
        - name: jaeger-config-volume
          configMap:
            name: jaeger-config
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
spec:
  ports:
    - name: ui
      port: 16686
    - name: otlp-http
      port: 4318
    - name: otlp-grpc
      port: 4317
  selector:
    app: jaeger
